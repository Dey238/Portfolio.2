<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contacto</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #000000, #0a0f1f, #000000);
            font-family: "Segoe UI", sans-serif;
            color: white;
        }

        .contact-card {
            background: rgba(20, 20, 30, 0.9);
            border: 1px solid rgba(0, 140, 255, 0.2);
            border-radius: 15px;
            box-shadow: 0 0 40px rgba(0, 140, 255, 0.15);
        }

        h1 {
            color: #00aaff;
            font-weight: 600;
        }

        .form-control {
            background-color: #111827;
            border: 1px solid #1f2937;
            color: white;
        }

        .form-control:focus {
            background-color: #0f172a;
            border-color: #00aaff;
            box-shadow: 0 0 0 0.2rem rgba(0, 170, 255, 0.25);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.4);
        }

        label {
            color: #cbd5e1;
            font-weight: 500;
        }

        .btn-custom {
            background: #007bff;
            border: none;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: 0.3s ease;
        }

        .btn-custom:hover {
            background: #00aaff;
            box-shadow: 0 0 15px #00aaff;
            transform: translateY(-2px);
        }

    </style>
</head>
    
<body>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="contact-card p-4">
                <h1 class="text-center mb-4">Contáctame</h1>

                <form action="https://formspree.io/f/meeeqdba" method="POST">

                    <div class="mb-3">
                        <label for="name" class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="name" name="nombre" placeholder="Tu nombre completo" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ejemplo@email.com" required>
                    </div>

                    <div class="mb-3">
                        <label for="tlf" class="form-label">Número telefónico</label>
                        <input type="tel" class="form-control" id="tlf" name="telefono" placeholder="+54 9 351 0000000">
                    </div>

                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea class="form-control" id="mensaje" name="mensaje" rows="4" placeholder="Escribe tu mensaje..." required></textarea>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-custom">
                            Enviar mensaje
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</main>

</body>
</html>
